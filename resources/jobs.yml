resources:
  jobs:
    # Deploys the UC SQL function to the target catalog/schema.
    # Run this after `databricks bundle deploy` and before the pipeline.
    #
    # Usage: databricks bundle run deploy_functions --target staging
    deploy_functions:
      name: "Deploy UC Functions [${bundle.target}]"
      tasks:
        - task_key: deploy
          spark_python_task:
            python_file: ./scripts/deploy_function.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.30.0
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]
            spark_env_vars:
              DATABRICKS_WAREHOUSE_ID: ${var.warehouse_id}
              BDD_CATALOG: ${var.catalog}
              BDD_SCHEMA: ${var.schema}
